# llm-models — canonical alias registry
# This file is the single source of truth for logical model names.
# llm-litellm renders its router config from here; backends pre-pull weights
# listed here. See CLAUDE.md §7.
#
# Trimmed 2026-07-04 to a small, deliberate local set (ornith-35b,
# coder-agentic, resident-small) — the qwen2.5 family (router-1b, intent-3b,
# main-70b, coder-strong) and the other extras (coder-thinking,
# vlm-qwen2vl, fastbatch-4b) were cut: too many resident/on-demand models
# loaded for no real benefit, and qwen2.5 specifically is dated relative to
# what's now running. Cloud aliases are untouched — they carry no local
# weight/RAM cost. embed-bge was cut in the same pass, then reinstated
# 2026-07-06 for phase-2-memory (see rag-embedder module) — mem0 and the
# RAG watchers need a real embedding alias behind the gateway.
models:
  # Small, always-on general-purpose assistant model. gemma4 family:
  # confirmed correct structured tool_calls, and MoE (~4B active of ~9.6GB
  # on disk) suits this hardware's abundant-memory/limited-compute profile.
  # Runs on Lemonade's NPU/FLM backend (gemma4-it-e4b-FLM), not Ollama —
  # hardware-verified 2026-07-04 end-to-end including persistence across a
  # service restart — so an always-on model doesn't permanently occupy
  # iGPU/GTT memory that coder-agentic/ornith-35b also need; the NPU
  # otherwise sits idle. keep_alive/pinning is Lemonade's own concern now
  # (see llm-lemonade), not Ollama's litellm_params.keep_alive.
  - alias: resident-small
    backend: lemonade
    model_id: gemma4-it-e4b-FLM
    size_gb: 9.6

  # gemma4 (not qwen2.5-coder) on purpose: Ollama's streaming tool-call
  # support is broken for the qwen2 family (repro'd directly against
  # Ollama's native /api/chat with stream:true+tools — content leaks the
  # raw JSON as text instead of a structured tool_calls delta, regardless
  # of model size). gemma4 and llama3.2 both produce correct structured
  # tool_calls in the same test; gemma4 was chosen for stronger general
  # capability. devstral:24b (Mistral's dedicated agentic-coding model)
  # was also tried and rejected — it either skipped tool calls or refused
  # outright even when explicitly told to use them, in this same harness.
  #
  # Moved from Ollama to Lemonade's llamacpp:vulkan backend 2026-07-05 —
  # hardware-verified: same GGUF weights, but Lemonade's Vulkan backend
  # measured ~41.6 tok/s vs Ollama's ~30.7 tok/s on this identical model
  # (+35%), and tool-calling was re-verified structured (streaming
  # tool_calls delta, finish_reason: "tool_calls") on this backend before
  # switching — see modules/llm-lemonade/README.md for the full backend
  # comparison (ROCm was tried first per AMD's own guidance and rejected:
  # it can't allocate past the 4GB VRAM carve-out into GTT the way Ollama's
  # build does, even with enable_dgpu_gtt on, and is far slower once forced
  # to — Vulkan turned out to be the actual best performer on this specific
  # APU for llama.cpp inference, contrary to the ROCm-first assumption).
  - alias: coder-agentic
    backend: lemonade
    model_id: Gemma-4-26B-A4B-it-GGUF
    size_gb: 16.9

  # 35B MoE reasoning + agentic-coding model. Same migration as
  # coder-agentic above: Lemonade's llamacpp:vulkan backend measured
  # ~58.6 tok/s vs Ollama's ~38.8 tok/s (+51%) for this exact model,
  # tool-calling re-verified structured on the new backend.
  - alias: ornith-35b
    backend: lemonade
    model_id: Ornith-1.0-35B-GGUF-Q4_K_M
    size_gb: 19.7

  # Experimental giant local model. Moved from Lemonade to Ollama 2026-07-07:
  # Qwen 3.5-122B was unstable on Lemonade due to a slot-tracking bug in
  # the router when max_loaded_models=2 (Ornith-35B + Qwen resident → router
  # tried to evict a non-existent model → llama-server exit). Ollama handles
  # the 54GB GGUF fine (verified: qwen3.6:35b-a3b 24GB runs on Ollama
  # already on this hardware). Same weights, same quality — just a different
  # serving backend.
  - alias: qwen35-122b-q3
    backend: ollama
    model_id: qwen3.5:122b
    size_gb: 53.9

  - alias: main-cloud
    backend: anthropic
    model_id: claude-sonnet-4-6
    size_gb: cloud

  - alias: coder-cloud
    backend: anthropic
    model_id: claude-sonnet-4-6
    size_gb: cloud

  - alias: thinking-cloud
    backend: anthropic
    model_id: claude-opus-4-8
    size_gb: cloud

  - alias: gpt4o-cloud
    backend: openai
    model_id: gpt-4o
    size_gb: cloud

  - alias: gemini-cloud
    backend: google
    model_id: gemini-2.5-pro
    size_gb: cloud

  # Phase 2 (memory-rag): bge-m3 + bge-reranker-v2-m3, served by
  # modules/rag-embedder on 127.0.0.1:8201. backend isn't ollama/lemonade
  # on purpose — the rag-embedder container manages its own model cache
  # (see its README), so aipc's own models-sync tooling should leave it
  # alone (models.py's LOCAL_BACKENDS check already skips any backend
  # other than ollama/lemonade for pull/sync).
  - alias: embed-bge
    backend: rag-embedder
    model_id: bge-m3
    size_gb: 3.4
