# llm-models — canonical alias registry
# This file is the single source of truth for logical model names.
# llm-litellm renders its router config from here; backends pre-pull weights
# listed here. See CLAUDE.md §7.
#
# Trimmed 2026-07-04 to a small, deliberate local set (ornith-35b,
# coder-agentic, resident-small) — the qwen2.5 family (router-1b, intent-3b,
# main-70b, coder-strong) and the other extras (coder-thinking, embed-bge,
# vlm-qwen2vl, fastbatch-4b) were cut: too many resident/on-demand models
# loaded for no real benefit, and qwen2.5 specifically is dated relative to
# what's now running. Cloud aliases are untouched — they carry no local
# weight/RAM cost.
models:
  # Small, always-on general-purpose assistant model. gemma4 family:
  # confirmed correct structured tool_calls, and MoE (~4B active of ~9.6GB
  # on disk) suits this hardware's abundant-memory/limited-compute profile.
  # Runs on Lemonade's NPU/FLM backend (gemma4-it-e4b-FLM), not Ollama —
  # hardware-verified 2026-07-04 end-to-end including persistence across a
  # service restart — so an always-on model doesn't permanently occupy
  # iGPU/GTT memory that coder-agentic/ornith-35b also need; the NPU
  # otherwise sits idle. keep_alive/pinning is Lemonade's own concern now
  # (see llm-lemonade), not Ollama's litellm_params.keep_alive.
  - alias: resident-small
    backend: lemonade
    model_id: gemma4-it-e4b-FLM
    size_gb: 9.6

  # gemma4 (not qwen2.5-coder) on purpose: Ollama's streaming tool-call
  # support is broken for the qwen2 family (repro'd directly against
  # Ollama's native /api/chat with stream:true+tools — content leaks the
  # raw JSON as text instead of a structured tool_calls delta, regardless
  # of model size). gemma4 and llama3.2 both produce correct structured
  # tool_calls in the same test; gemma4 was chosen for stronger general
  # capability. devstral:24b (Mistral's dedicated agentic-coding model)
  # was also tried and rejected — it either skipped tool calls or refused
  # outright even when explicitly told to use them, in this same harness.
  - alias: coder-agentic
    backend: ollama
    model_id: gemma4:26b
    size_gb: 18.0
    keep_alive: "10m"

  # 35B MoE reasoning + agentic-coding model, pulled straight from HF via
  # Ollama's hf.co/ gateway (deepreinforce-ai/Ornith-1.0-35B-GGUF, Q4_K_M).
  - alias: ornith-35b
    backend: ollama
    model_id: hf.co/deepreinforce-ai/Ornith-1.0-35B-GGUF:Q4_K_M
    size_gb: 19.7
    keep_alive: "10m"

  - alias: main-cloud
    backend: anthropic
    model_id: claude-sonnet-4-6
    size_gb: cloud

  - alias: coder-cloud
    backend: anthropic
    model_id: claude-sonnet-4-6
    size_gb: cloud

  - alias: thinking-cloud
    backend: anthropic
    model_id: claude-opus-4-8
    size_gb: cloud

  - alias: gpt4o-cloud
    backend: openai
    model_id: gpt-4o
    size_gb: cloud

  - alias: gemini-cloud
    backend: google
    model_id: gemini-2.5-pro
    size_gb: cloud
