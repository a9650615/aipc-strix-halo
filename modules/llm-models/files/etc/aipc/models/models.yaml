# llm-models — canonical alias registry
# This file is the single source of truth for logical model names.
# llm-litellm renders its router config from here; backends pre-pull weights
# listed here. See CLAUDE.md §7.

models:
  - alias: router-1b
    backend: ollama
    model_id: qwen2.5:1.5b-instruct-q4_K_M
    size_gb: 1.0

  - alias: intent-3b
    backend: lemonade
    model_id: amd/Qwen2.5-3B-Instruct-ryzen-ai
    size_gb: 2.5

  - alias: main-70b
    backend: ollama
    model_id: qwen2.5:72b-instruct-q4_K_M
    size_gb: 45.0

  - alias: coder-fast
    backend: ollama
    model_id: qwen2.5-coder:7b-instruct-q4_K_M
    size_gb: 4.5

  - alias: coder-strong
    backend: ollama
    model_id: qwen2.5-coder:32b-instruct-q4_K_M
    size_gb: 19.0

  - alias: coder-thinking
    backend: ollama
    model_id: deepseek-r1:14b-q4_K_M
    size_gb: 9.0

  # gemma4 (not qwen2.5-coder) on purpose: Ollama's streaming tool-call
  # support is broken for the qwen2 family (repro'd directly against
  # Ollama's native /api/chat with stream:true+tools — content leaks the
  # raw JSON as text instead of a structured tool_calls delta, regardless
  # of model size: reproduced on both coder-fast/7B and coder-strong/32B).
  # gemma4 and llama3.2 both produce correct structured tool_calls in the
  # same test; gemma4 was chosen for stronger general capability.
  # devstral:24b (Mistral's dedicated agentic-coding model) was also
  # tried and rejected — it either skipped tool calls or refused outright
  # even when explicitly told to use them, in this same harness.
  - alias: coder-agentic
    backend: ollama
    model_id: gemma4:26b
    size_gb: 18.0

  - alias: embed-bge
    backend: lemonade
    model_id: BAAI/bge-m3
    size_gb: 2.2

  - alias: vlm-qwen2vl
    backend: ollama
    model_id: qwen2-vl:7b-instruct-q4_K_M
    size_gb: 4.5

  - alias: main-cloud
    backend: anthropic
    model_id: claude-sonnet-4-6
    size_gb: cloud

  - alias: coder-cloud
    backend: anthropic
    model_id: claude-sonnet-4-6
    size_gb: cloud

  - alias: thinking-cloud
    backend: anthropic
    model_id: claude-opus-4-8
    size_gb: cloud

  - alias: gpt4o-cloud
    backend: openai
    model_id: gpt-4o
    size_gb: cloud

  - alias: gemini-cloud
    backend: google
    model_id: gemini-2.5-pro
    size_gb: cloud
