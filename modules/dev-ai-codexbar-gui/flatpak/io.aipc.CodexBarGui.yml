# CodexBar GUI — Flatpak (PySide6 BaseApp)
# Build/install (user):
#   ./build-and-install.sh
id: io.aipc.CodexBarGui
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
base: io.qt.PySide.BaseApp
base-version: "6.10"
command: codexbar-gui
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --share=network
  - --device=dri
  - --socket=session-bus
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.Flatpak
  - --filesystem=home
  - --filesystem=xdg-config/codexbar:create
  - --filesystem=xdg-config/codex:create
  - --filesystem=xdg-config/claude:create
  - --env=CODEXBAR_FLATPAK=1
  # Do NOT force QT_QPA_PLATFORM=xcb — Flatpak often has no XWayland display
  # and then fails to start after quit. Prefer wayland (see codexbar-gui.sh).
build-options:
  env:
    BASEAPP_REMOVE_WEBENGINE: "1"
    BASEAPP_DISABLE_NUMPY: "1"
cleanup-commands:
  - /app/cleanup-BaseApp.sh
modules:
  - name: codexbar-gui
    buildsystem: simple
    build-commands:
      - install -Dm755 codexbar-gui.sh /app/bin/codexbar-gui
      - install -Dm755 codexbar-host.sh /app/bin/codexbar
      - mkdir -p /app/lib/codexbar-gui
      - cp -a codexbar_gui /app/lib/codexbar-gui/
      - install -Dm644 io.aipc.CodexBarGui.desktop /app/share/applications/io.aipc.CodexBarGui.desktop
      - install -Dm644 io.aipc.CodexBarGui.metainfo.xml /app/share/metainfo/io.aipc.CodexBarGui.metainfo.xml
      - install -Dm644 io.aipc.CodexBarGui.png /app/share/icons/hicolor/128x128/apps/io.aipc.CodexBarGui.png
    sources:
      - type: dir
        path: ../files/usr/lib/codexbar-gui/codexbar_gui
        dest: codexbar_gui
      - type: file
        path: codexbar-gui.sh
      - type: file
        path: codexbar-host.sh
      - type: file
        path: io.aipc.CodexBarGui.desktop
      - type: file
        path: io.aipc.CodexBarGui.metainfo.xml
      - type: file
        path: io.aipc.CodexBarGui.png
