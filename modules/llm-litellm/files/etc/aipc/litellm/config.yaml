# keep_alive on each ollama_chat/ entry: per-model override of the
# ollama.container daemon default (10m — see modules/llm-ollama's quadlet).
# Trimmed 2026-07-04 to match models.yaml's small deliberate local set
# (resident-small, coder-agentic, ornith-35b) — router-1b/intent-3b/
# main-70b/coder-strong (qwen2.5 family, dated) and coder-thinking/
# vlm-qwen2vl/fastbatch-4b (extras with no clear use) were cut.
# Cloud aliases are untouched. embed-bge reinstated 2026-07-06 for
# phase-2-memory: mem0 and the RAG watchers need it behind the gateway
# (see modules/rag-embedder).
model_list:
  # Small, always-on general-purpose assistant — swapped 2026-07-12 (0008
  # fleet refresh item 6) from gemma4-it-e4b-FLM to qwen3.5-4b-FLM, same
  # resident NPU slot (replacement, not an added resident NPU model — see
  # models.yaml for the CREATE_HWCTX -22 hardware evidence). model name
  # below is derived, not yet hardware-confirmed — see models.yaml comment.
  # enable_thinking: false is REQUIRED here (new for this alias):
  # qwen3.5:4b is hybrid-thinking; without it, reasoning_content fills and
  # content stays empty until max_tokens — same failure mode already fixed
  # for assistant-gemma/coder-agentic. Runs on Lemonade's NPU/FLM backend,
  # not Ollama — hardware-verified 2026-07-04 end-to-end (prior model)
  # including persistence across a service restart, so an always-on model
  # doesn't permanently compete with big interactive models for iGPU/GTT
  # memory.
  - model_name: resident-small
    litellm_params:
      model: openai/qwen3.5-4b-FLM
      api_base: http://127.0.0.1:8001/v1
      api_key: none
      extra_body:
        chat_template_kwargs:
          enable_thinking: false
      # timeout/num_retries: see coder-agentic below for why local
      # (Lemonade-backed) models override the global router_settings.
      timeout: 1800
      num_retries: 0
    model_info:
      max_input_tokens: 262144
      max_output_tokens: 4096

  # Compact / Haiku-tier, swapped 2026-07-12 (0008 fleet refresh): Unsloth
  # Qwen3.5-4B UD-Q4_K_XL on Lemonade llamacpp:vulkan, replacing the
  # Gemma-4-E2B QAT quant — see models.yaml for the repo-id correction and
  # Gated-DeltaNet long-prefill rationale. On-demand only: not pinned;
  # lemond loads on first request and may LRU-evict when max_loaded_models
  # is full (competes with coder-agentic for iGPU). Native context 262,144
  # (up from the prior model's ~128k) — max_input_tokens below bumped to
  # match. Wire CCS ANTHROPIC_DEFAULT_HAIKU_MODEL=coder-compact (see
  # modules/ccs README).
  #
  # DEFERRED (user 2026-07-11, do not implement yet): "main model + live KV
  # compact" — run compression as an append on the same llama-server slot
  # that already holds the chat KV (same model as coder-agentic), so bulk
  # history prefill is skipped; only the compact instruction is prefilled.
  # Requires stateful session/slot compact in Hermes (or equivalent), not a
  # separate aux model re-POST of full messages. Trade-off: occupies agent
  # -np slots during compact. Current separate lane keeps isolation.
  - model_name: coder-compact
    litellm_params:
      model: openai/Qwen3.5-4B-UD-Q4_K_XL
      api_base: http://127.0.0.1:8001/v1
      api_key: none
      extra_body:
        chat_template_kwargs:
          enable_thinking: false
      timeout: 600
      num_retries: 0
    model_info:
      max_input_tokens: 262144
      max_output_tokens: 4096

  # See models.yaml: 2026-07-13 SWAP — now SC117 Qwen3.6-35B-A3B native-MTP
  # (heretic, APEX I-Balanced) replacing the HauhauCS Aggressive Q4_K_P. Same
  # base model, but 20 native MTP layers + --spec-type draft-mtp give +28%
  # single-stream decode (hardware A/B) with identical tool-call quality.
  # Same lemond :8001 router as resident-small; no keep_alive — Lemonade
  # max_loaded_models keeps this + ornith-35b. enable_thinking false so
  # agentic/tool consumers get structured tool_calls without hybrid-thinking
  # preambles (daily chat can override per-request).
  - model_name: coder-agentic
    litellm_params:
      model: openai/Qwen3.6-35B-A3B-heretic-NativeMTP-APEX-I-Balanced
      api_base: http://127.0.0.1:8001/v1
      api_key: none
      extra_body:
        chat_template_kwargs:
          enable_thinking: false
      # Root-caused 2026-07-05 (task: "coder-agentic sessions stop mid-task
      # unexpectedly"): the global router_settings below (timeout: 600,
      # num_retries: 2) means that once real concurrent load saturates
      # Lemonade's 4 slots (hardware-observed: a single ~217k-token prompt
      # took 26+ min just for prefill under -np 4 -kvu), any request still
      # in flight past 600s gets retried -- but a slow local completion
      # isn't a transient failure, it's still working. Retrying dumps a
      # second (then third) identical copy of the same expensive request
      # onto the same already-saturated slots, compounding the exact
      # contention that caused the timeout in the first place. From the
      # client's side this looks exactly like the reported symptom: the
      # session silently stops making progress. Per-model override:
      # num_retries: 0 (never retry a timed-out local completion) and a
      # much longer timeout (this hardware measured legitimate multi-minute
      # waits under load -- 4m53s hardware-verified for one /chat round trip
      # during task #13's verification) so a genuinely slow-but-working
      # request isn't cut off either.
      timeout: 1800
      num_retries: 0
    # Live Lemonade recipe uses --ctx-size 131072 (was 32768 — too tight for
    # agentic tool loops). Model card max is 262144; raise recipe + this
    # field together if you need the full window.
    model_info:
      max_input_tokens: 131072
      max_output_tokens: 8192

  # Daily Gemma uncensored (2026-07-09) — does not replace coder-agentic.
  # HauhauCS Gemma4-26B-A4B QAT Balanced; same lemond :8001 + timeout policy.
  # enable_thinking false: otherwise Gemma hybrid thinking fills
  # reasoning_content and leaves message.content empty until max_tokens.
  # Registered id unchanged by the 2026-07-12 MTP wiring (0008 fleet
  # refresh) — same custom checkpoint name, re-pulled with a second `draft`
  # checkpoint underneath (see models.yaml). Serving now single-stream
  # (-np 1, was -np 4) while the draft checkpoint is attached — see
  # models.yaml comment for the confirmed n_parallel=1 MTP constraint.
  - model_name: assistant-gemma
    litellm_params:
      model: openai/Gemma4-26B-A4B-QAT-Uncensored-Balanced-Q4_K_M
      api_base: http://127.0.0.1:8001/v1
      api_key: none
      extra_body:
        chat_template_kwargs:
          enable_thinking: false
      timeout: 1800
      num_retries: 0

  # Ornith-1.0-35B — 35B MoE reasoning + agentic-coding model. Moved from
  # Ollama to Lemonade (llamacpp:vulkan) 2026-07-05, same reasoning as
  # coder-agentic above. Default swapped 2026-07-12 again (user-directed)
  # to SC117's APEX-I-Balanced quant of the original deepreinforce-ai base
  # (replacing the Heretic decensored quant — stock refusal behaviour is
  # back). See models.yaml for the tier choice, the MTP -np caveat, the
  # tool-call re-verification caveat and the idle_unload_after_s: 900
  # policy.
  - model_name: ornith-35b
    litellm_params:
      model: openai/Ornith-1.0-35B-MTP-APEX-I-Balanced
      api_base: http://127.0.0.1:8001/v1
      api_key: none
      # Hardware-verified 2026-07-12 on this quant: default (thinking) mode
      # fills reasoning_content and leaves content empty until max_tokens —
      # same hybrid-thinking failure mode as assistant-gemma/coder-agentic.
      # Reasoning consumers flip this per-request.
      extra_body:
        chat_template_kwargs:
          enable_thinking: false
      # timeout/num_retries: see coder-agentic above for why local
      # (Lemonade-backed) models override the global router_settings.
      timeout: 1800
      num_retries: 0
    model_info:
      max_input_tokens: 262144
      max_output_tokens: 4096

  # Qwythos-9B-Claude-Mythos-5-1M (empero-ai, Q4_K_M GGUF, 5.6GB) — Hermes's
  # decision + tool-call brain. See models.yaml; same lemond :8001 router +
  # timeout policy as the other Lemonade Vulkan LLMs. enable_thinking false:
  # Qwythos decides + emits structured tool_calls, and hybrid-thinking would
  # leave message.content empty until max_tokens (see assistant-gemma) — flip
  # per-request only when you want a visible decision trace.
  - model_name: qwythos-9b
    litellm_params:
      model: openai/Qwythos-9B-Claude-Mythos-5-1M-Q4_K_M
      api_base: http://127.0.0.1:8001/v1
      api_key: none
      extra_body:
        chat_template_kwargs:
          enable_thinking: false
      timeout: 1800
      num_retries: 0
    model_info:
      max_input_tokens: 131072
      max_output_tokens: 4096

  # qwen35-122b-q3 retired 2026-07-11 (weights removed; see models.yaml).

  # coder-122b (2026-07-12, 0012): SC117 Qwen3.5-122B-A10B APEX I-Compact
  # (55.1 GiB + mmproj) — heavy coding model, tier: exclusive. Only viable
  # because of the memory scheduler callback below (see litellm_settings):
  # admission preempts the agent fleet before this load reaches lemond.
  # Qwen3.5 hybrid thinking -> enable_thinking false for tool/coding
  # consumers, same as coder-agentic.
  - model_name: coder-122b
    litellm_params:
      model: openai/Qwen3.5-122B-A10B-Uncensored-APEX-Compact
      api_base: http://127.0.0.1:8001/v1
      api_key: none
      extra_body:
        chat_template_kwargs:
          enable_thinking: false
      # timeout/num_retries: see coder-agentic — local Lemonade models
      # override the global router_settings.
      timeout: 1800
      num_retries: 0
    model_info:
      max_input_tokens: 262144
      max_output_tokens: 8192

  - model_name: main-cloud
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: coder-cloud
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: thinking-cloud
    litellm_params:
      model: anthropic/claude-opus-4-8
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: gpt4o-cloud
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gemini-cloud
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY

  # Z.AI monthly Coding Plan; endpoint/model match the working CCS glm profile.
  # Tool-only: agent-orchestrator checks CodexBar quota before selecting it.
  - model_name: glm-cloud
    litellm_params:
      model: anthropic/glm-5.2
      api_base: https://api.z.ai/api/anthropic
      api_key: os.environ/Z_AI_API_KEY
      timeout: 180
      num_retries: 0

  # Phase 2 (memory-rag): bge-m3, served by modules/rag-embedder. Local
  # service, not cloud — timeout/num_retries overridden same as the other
  # local (Lemonade-backed) entries above, for the same reason.
  - model_name: embed-bge
    litellm_params:
      model: openai/bge-m3
      api_base: http://127.0.0.1:8201/v1
      api_key: none
      timeout: 60
      num_retries: 0


  # Vision alias (live-hotfix 2026-07-10): phase-4 vlm-qwen2vl → Gemma-4 + mmproj
  - model_name: vlm-qwen2vl
    litellm_params:
      model: openai/Gemma4-26B-A4B-Uncensored-Vision-Q4_K_M
      api_base: http://127.0.0.1:8001/v1
      api_key: none
      extra_body:
        chat_template_kwargs:
          enable_thinking: false
      timeout: 1800
      num_retries: 0


  # Screen UI / OCR, swapped 2026-07-12 (0008 fleet refresh): Qwen3-VL-8B-
  # Instruct (official Qwen GGUF, Q4_K_M + Q8_0 mmproj), replacing the
  # Qwen2.5-VL-7B community re-quant — see models.yaml for the mmproj-
  # quant-pairing note. Prefer this for "what's on screen" over heavy
  # Gemma uncensored vision. Also newly added to models.yaml itself in this
  # change (previously only registered here — see that file's comment).
  - model_name: vlm-screen
    litellm_params:
      model: openai/Qwen3VL-8B-Instruct-Q4_K_M
      api_base: http://127.0.0.1:8001/v1
      api_key: none
      timeout: 600
      num_retries: 0

router_settings:
  timeout: 600
  num_retries: 2
  allowed_fails: 3
  cooldown_time: 60
  # ponytail: no idle-eviction key exists here. Verified 2026-07-02 against
  # litellm/types/router.py::RouterConfig and litellm/proxy/_types.py general
  # settings for the pinned tag (v1.89.4, see quadlet/litellm.container) —
  # neither accepts an "idle_timeout"/backend-eviction field. LiteLLM is a
  # stateless proxy; it cannot stop the vLLM process it routes to. The 10-min
  # idle eviction for vLLM must live in modules/llm-vllm's own systemd unit
  # (timer or ExecStopPost idle-shutdown wrapper), not here. Re-check this
  # comment against the router.py source if the pinned digest is ever bumped.

litellm_settings:
  # The model behind an alias can change backend (Ollama/vLLM/llama.cpp/
  # cloud) without every consumer knowing -- hardware-verified 2026-07-05:
  # Hermes sent reasoning_effort (fine for a reasoning model like ornith-35b)
  # against coder-agentic when it was still on Gemma-4-26B-A4B-it-GGUF,
  # which doesn't support that param, and got a hard 400 instead of the
  # gateway just dropping the field. This is the single choke point for
  # every consumer (CLAUDE.md §7); fixing it here beats teaching every
  # client which params every possible backend model supports.
  drop_params: true
  num_retries: 2
  request_timeout: 600
  # 0012 memory scheduler: admission control for Lemonade GPU loads —
  # budget/priority eviction + request holding happens BEFORE litellm
  # forwards to lemond. File is mounted at /app/scheduler_hook.py by the
  # quadlet (alongside /app/models.yaml); degrades open if lemonade health
  # is unreachable. See openspec/changes/0012-memory-scheduler-coder-122b.
  callbacks: ["scheduler_hook.scheduler"]
