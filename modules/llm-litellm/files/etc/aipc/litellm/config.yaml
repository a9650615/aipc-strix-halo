# keep_alive on each ollama_chat/ entry: per-model override of the
# ollama.container daemon default (10m — see modules/llm-ollama's quadlet).
# Trimmed 2026-07-04 to match models.yaml's small deliberate local set
# (resident-small, coder-agentic, ornith-35b) — router-1b/intent-3b/
# main-70b/coder-strong (qwen2.5 family, dated) and coder-thinking/
# vlm-qwen2vl/fastbatch-4b (extras with no clear use) were cut.
# Cloud aliases are untouched. embed-bge reinstated 2026-07-06 for
# phase-2-memory: mem0 and the RAG watchers need it behind the gateway
# (see modules/rag-embedder).
model_list:
  # Small, always-on general-purpose assistant — see models.yaml for why
  # gemma4:e4b (MoE, ~4B active) was picked over a dense alternative like
  # llama3.1:8b. Runs on Lemonade's NPU/FLM backend (gemma4-it-e4b-FLM),
  # not Ollama — hardware-verified 2026-07-04 end-to-end including
  # persistence across a service restart, so an always-on model doesn't
  # permanently compete with big interactive models for iGPU/GTT memory.
  - model_name: resident-small
    litellm_params:
      model: openai/gemma4-it-e4b-FLM
      api_base: http://127.0.0.1:8001/v1
      api_key: none
      # timeout/num_retries: see coder-agentic below for why local
      # (Lemonade-backed) models override the global router_settings.
      timeout: 1800
      num_retries: 0

  # See models.yaml for why this is gemma4 and not qwen2.5-coder: Ollama's
  # streaming tool-call support is broken for the qwen2 family regardless
  # of model size, hardware-verified via direct /api/chat testing.
  #
  # Moved from Ollama to Lemonade (llamacpp:vulkan) 2026-07-05 — see
  # models.yaml and modules/llm-lemonade/README.md for the benchmark and
  # backend-choice writeup. Same router (lemond on :8001) as resident-small;
  # Lemonade forwards by the `model` field to whichever child llama-server
  # process currently has that model loaded — no keep_alive needed here,
  # Lemonade's own max_loaded_models=2 setting keeps both this and
  # ornith-35b resident simultaneously (see llm-lemonade's config).
  - model_name: coder-agentic
    litellm_params:
      model: openai/Gemma-4-26B-A4B-it-GGUF
      api_base: http://127.0.0.1:8001/v1
      api_key: none
      # Root-caused 2026-07-05 (task: "coder-agentic sessions stop mid-task
      # unexpectedly"): the global router_settings below (timeout: 600,
      # num_retries: 2) means that once real concurrent load saturates
      # Lemonade's 4 slots (hardware-observed: a single ~217k-token prompt
      # took 26+ min just for prefill under -np 4 -kvu), any request still
      # in flight past 600s gets retried -- but a slow local completion
      # isn't a transient failure, it's still working. Retrying dumps a
      # second (then third) identical copy of the same expensive request
      # onto the same already-saturated slots, compounding the exact
      # contention that caused the timeout in the first place. From the
      # client's side this looks exactly like the reported symptom: the
      # session silently stops making progress. Per-model override:
      # num_retries: 0 (never retry a timed-out local completion) and a
      # much longer timeout (this hardware measured legitimate multi-minute
      # waits under load -- 4m53s hardware-verified for one /chat round trip
      # during task #13's verification) so a genuinely slow-but-working
      # request isn't cut off either.
      timeout: 1800
      num_retries: 0

  # Ornith-1.0-35B (deepreinforce-ai/Ornith-1.0-35B-GGUF, Q4_K_M, 19.7GB) —
  # 35B MoE reasoning + agentic-coding model. Moved from Ollama to Lemonade
  # (llamacpp:vulkan) 2026-07-05, same reasoning as coder-agentic above.
  - model_name: ornith-35b
    litellm_params:
      model: openai/Ornith-1.0-35B-GGUF-Q4_K_M
      api_base: http://127.0.0.1:8001/v1
      api_key: none
      # timeout/num_retries: see coder-agentic above for why local
      # (Lemonade-backed) models override the global router_settings.
      timeout: 1800
      num_retries: 0

  - model_name: main-cloud
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: coder-cloud
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: thinking-cloud
    litellm_params:
      model: anthropic/claude-opus-4-8
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: gpt4o-cloud
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gemini-cloud
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY

  # Phase 2 (memory-rag): bge-m3, served by modules/rag-embedder. Local
  # service, not cloud — timeout/num_retries overridden same as the other
  # local (Lemonade-backed) entries above, for the same reason.
  - model_name: embed-bge
    litellm_params:
      model: openai/bge-m3
      api_base: http://127.0.0.1:8201/v1
      api_key: none
      timeout: 60
      num_retries: 0

router_settings:
  timeout: 600
  num_retries: 2
  allowed_fails: 3
  cooldown_time: 60
  # ponytail: no idle-eviction key exists here. Verified 2026-07-02 against
  # litellm/types/router.py::RouterConfig and litellm/proxy/_types.py general
  # settings for the pinned tag (v1.89.4, see quadlet/litellm.container) —
  # neither accepts an "idle_timeout"/backend-eviction field. LiteLLM is a
  # stateless proxy; it cannot stop the vLLM process it routes to. The 10-min
  # idle eviction for vLLM must live in modules/llm-vllm's own systemd unit
  # (timer or ExecStopPost idle-shutdown wrapper), not here. Re-check this
  # comment against the router.py source if the pinned digest is ever bumped.

litellm_settings:
  drop_params: false
  num_retries: 2
  request_timeout: 600
