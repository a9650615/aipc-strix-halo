# keep_alive on each ollama_chat/ entry: per-model override of the
# ollama.container daemon default (10m — see modules/llm-ollama's quadlet).
# "-1" = never evict, reserved for the always-on resident-small model.
# Everything else evicts after 10m idle so switching between tools/tasks
# doesn't leave every previously-used model permanently resident — with
# several 10-45GB models in the registry and 128GB total unified memory,
# "everything stays loaded forever" is a real ceiling, not hypothetical.
# Confirmed end-to-end 2026-07-03 that this override actually takes effect
# against the pinned LiteLLM version (some upstream LiteLLM issues report
# it not working — it does here: verified via Ollama's /api/ps expires_at).
model_list:
  - model_name: router-1b
    litellm_params:
      model: ollama_chat/qwen2.5:1.5b-instruct-q4_K_M
      api_base: http://127.0.0.1:11434
      keep_alive: -1

  - model_name: intent-3b
    litellm_params:
      model: openai/intent-3b
      api_base: http://127.0.0.1:8001/v1
      api_key: none

  # Small, always-on general-purpose assistant — see models.yaml for why
  # gemma4:e4b (MoE, ~4B active) was picked over a dense alternative like
  # llama3.1:8b.
  - model_name: resident-small
    litellm_params:
      model: ollama_chat/gemma4:e4b
      api_base: http://127.0.0.1:11434
      keep_alive: -1

  - model_name: main-70b
    litellm_params:
      model: ollama_chat/qwen2.5:72b-instruct-q4_K_M
      api_base: http://127.0.0.1:11434
      keep_alive: "10m"

  - model_name: coder-fast
    litellm_params:
      model: ollama_chat/qwen2.5-coder:7b-instruct-q4_K_M
      api_base: http://127.0.0.1:11434
      keep_alive: "10m"

  - model_name: coder-strong
    litellm_params:
      model: ollama_chat/qwen2.5-coder:32b-instruct-q4_K_M
      api_base: http://127.0.0.1:11434
      keep_alive: "10m"

  - model_name: coder-thinking
    litellm_params:
      model: ollama_chat/deepseek-r1:14b-q4_K_M
      api_base: http://127.0.0.1:11434
      keep_alive: "10m"

  # See models.yaml for why this is gemma4 and not qwen2.5-coder: Ollama's
  # streaming tool-call support is broken for the qwen2 family regardless
  # of model size, hardware-verified via direct /api/chat testing.
  - model_name: coder-agentic
    litellm_params:
      model: ollama_chat/gemma4:26b
      api_base: http://127.0.0.1:11434
      keep_alive: "10m"

  - model_name: embed-bge
    litellm_params:
      model: openai/bge-m3
      api_base: http://127.0.0.1:8001/v1
      api_key: none

  - model_name: vlm-qwen2vl
    litellm_params:
      model: ollama_chat/qwen2-vl:7b-instruct-q4_K_M
      api_base: http://127.0.0.1:11434
      keep_alive: "10m"

  - model_name: main-cloud
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: coder-cloud
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: thinking-cloud
    litellm_params:
      model: anthropic/claude-opus-4-8
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: gpt4o-cloud
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gemini-cloud
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY

router_settings:
  timeout: 600
  num_retries: 2
  allowed_fails: 3
  cooldown_time: 60
  # ponytail: no idle-eviction key exists here. Verified 2026-07-02 against
  # litellm/types/router.py::RouterConfig and litellm/proxy/_types.py general
  # settings for the pinned tag (v1.89.4, see quadlet/litellm.container) —
  # neither accepts an "idle_timeout"/backend-eviction field. LiteLLM is a
  # stateless proxy; it cannot stop the vLLM process it routes to. The 10-min
  # idle eviction for vLLM must live in modules/llm-vllm's own systemd unit
  # (timer or ExecStopPost idle-shutdown wrapper), not here. Re-check this
  # comment against the router.py source if the pinned digest is ever bumped.

litellm_settings:
  drop_params: false
  num_retries: 2
  request_timeout: 600
