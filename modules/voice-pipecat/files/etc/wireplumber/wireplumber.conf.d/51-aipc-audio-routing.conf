# AIPC audio routing (user session) — WirePlumber 0.5
#
# Keep built-in analog ahead of HDMI when Bluetooth is unavailable, while
# allowing an available Bluetooth speaker to win.

monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_output.*analog-stereo" }
    ]
    actions = {
      update-props = {
        priority.driver = 1200
        priority.session = 1200
      }
    }
  }
  {
    matches = [
      { node.name = "~alsa_output.*hdmi*" }
    ]
    actions = {
      update-props = {
        priority.driver = 200
        priority.session = 200
      }
    }
  }
]

monitor.bluez.rules = [
  {
    matches = [
      { node.name = "~bluez_output.*" }
    ]
    actions = {
      update-props = {
        priority.driver = 1500
        priority.session = 1500
      }
    }
  }
]
