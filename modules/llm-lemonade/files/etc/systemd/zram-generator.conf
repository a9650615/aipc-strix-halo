# aipc llm-lemonade: enlarge compressed swap for the unified-memory LLM box.
# Default zram (min(ram/2, 8G) on some images; 16G observed live) is too
# small a shock absorber when a model load competes with a browser-heavy
# desktop (2026-07-12 kernel OOM killed plasmashell/zen/hermes-webui with
# swap only 16G). Model weights are mmap'd and never swap; this buys room
# for anonymous desktop/app heaps under load spikes. User-accepted
# trade-off: swapping is fine, OOM-killing the desktop is not.
[zram0]
zram-size = min(ram / 2 + 16384, 49152)
compression-algorithm = zstd
