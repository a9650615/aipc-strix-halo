# Screen-control window-class blacklist (design.md D4, always-on mode).
# One window class (KWin resourceClass, roughly xdotool's WM_CLASS) per
# line, "#" comments allowed. A window whose class matches a line here is
# excluded from BOTH VLM screenshot analysis and input delivery — see
# aipc_agent_screen_control.gate.is_blacklisted().
#
# This is the *suggested* set from design.md D4/Q4, not yet
# hardware-verified against what the bazzite-dx image actually installs
# and what window class each app really exposes (Q4 flags this
# explicitly). Confirm and correct on real hardware before relying on
# this list for anything sensitive; edit freely to extend.

# Password managers
1password
1Password
org.gnome.keyring.SystemPrompter
gcr-prompter
org.kde.kwalletmanager5
keepassxc

# SSH / terminals — coarse: window class can't distinguish an SSH session
# from any other shell in the same terminal app, so this blacklists the
# whole terminal app. Remove entries here if that is too broad for your
# workflow (design.md's own Risks section already flags this trade-off).
konsole
org.kde.konsole
gnome-terminal-server
xterm

# Banking domains "inside Zed/VSCode browser preview" (design.md D4) are
# NOT representable at window-class granularity — the preview pane shares
# its host IDE's window class. No entry can implement this; documented
# gap, not an oversight.
