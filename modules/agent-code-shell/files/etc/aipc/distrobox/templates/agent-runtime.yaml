# distrobox-assemble manifest for the agent-code-shell sandbox (phase-4-agent
# tasks 3.1/3.3). INI syntax despite the .yaml extension — distrobox-assemble
# only understands INI (see modules/dev-distrobox-templates/README.md); the
# path/name is fixed by
# openspec/changes/phase-4-agent/specs/agent-runtime/spec.md.
[agent-runtime]
image=registry.fedoraproject.org/fedora-toolbox:41
pull=true
init=false
nvidia=false
root=false
replace=false
start_now=false
additional_packages="python3 python3-pip git"
home=~/.local/share/aipc-agent-runtime/home
volume="~/aipc-workspace:/workspace:rw"
init_hooks="pip3 install --user open-interpreter"
