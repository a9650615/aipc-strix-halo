# File-IO allowlist — phase-4-agent#4.1
# One absolute root directory per line; '#' starts a comment.
# Every path a tool touches must resolve (realpath, symlinks followed)
# inside one of these roots before any filesystem syscall runs.
#
# roots[0] is the "workspace": read/write/list/delete all just work here.
# Any other root below still allows read/write/list, but delete requires
# an aipc-agent-gate grant (phase-4-agent#5.1, not implemented yet — see
# aipc_agent_tools_files/tools.py for the fail-closed stub).
/var/lib/aipc-agent/workspace
