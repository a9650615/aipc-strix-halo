---
# SOPS creation rules — see docs/secrets-setup.md for key generation.
# Replace age1PLACEHOLDER_REPLACE_AFTER_KEYGEN with your age public key output:
#   age-keygen -o ~/.config/aipc/age.key
creation_rules:
  - path_regex: secrets/.*\.yaml$
    age: age1PLACEHOLDER_REPLACE_AFTER_KEYGEN
    encrypted_regex: >-
      (_key|_token|_secret|^api_|^data$|^stringData$)
