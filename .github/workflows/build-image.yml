name: Build Image
on:
  push:
    branches: [main]
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:
    inputs:
      promote_stable:
        type: boolean
        description: "Also push :stable tag"
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository_owner }}/aipc

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tools
        run: pip install -e tools
      - name: Set build date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
      - name: Render Containerfile
        run: |
          aipc render bootc \
            --image-ref ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.date.outputs.date }} \
            --build-date ${{ steps.date.outputs.date }} \
            --out targets/bootc/Containerfile
      - name: Compute tags
        id: tags
        run: |
          tags="rolling ${{ steps.date.outputs.date }}"
          if [ "${{ github.event.inputs.promote_stable }}" = "true" ]; then
            tags="${tags} stable"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"
      - name: Build image
        id: build
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.IMAGE }}
          tags: ${{ steps.tags.outputs.tags }}
          containerfiles: targets/bootc/Containerfile
          layers: true
          oci: true
      - name: Login to ghcr.io
        uses: redhat-actions/podman-login@v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build.outputs.image }}
          tags: ${{ steps.build.outputs.tags }}
          registry: ${{ env.REGISTRY }}
